events {}

pid /tmp/nginx.pid;

http {
  include mime.types;
  default_type application/octet-stream;
  sendfile on;
  keepalive_timeout 65;

  upstream backend {
      server pcts-backend:8080;
  }

  server {
    listen 4200;
    server_name  localhost;
    root   /usr/share/nginx/html;
    index  index.html;

    sub_filter "CSP_NONCE_PLACEHOLDER" $request_id;
    sub_filter_once off;

    # sha256-mwH/Oz1bMiZ9vHH84YJ6PbP6BpLW5nG9AD9Lad8u1+c= is an inline style for accessibility
    # $csp_header is set at container startup by docker-entrypoint.sh based on KEYCLOAK_URL
    include /etc/nginx/conf.d/csp.conf;

    add_header Content-Security-Policy $csp_header;

    location = /config.json {
      add_header Cache-Control "no-cache, no-store, must-revalidate";
      expires 0;
    }

    location / {
      # add the csp header again, because there is no inheritance
      add_header Content-Security-Policy $csp_header;

      expires 1y;
      add_header Cache-Control "public";

      try_files $uri $uri/ /index.html =404;
    }

    location /api {
      proxy_pass http://backend/api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
      access_log off;
      add_header 'Content-Type' 'application/json';
      return 200 '{"status":"UP"}';
    }
  }
}
