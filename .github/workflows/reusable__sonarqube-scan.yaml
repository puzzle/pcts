---
name: 'SonarQube Analysis'

on:
  workflow_call:
    inputs:
      COMMIT_HASH:
        type: string
        required: false

jobs:
  quality-gate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.COMMIT_HASH || github.head_ref }}
          fetch-depth: 0

      - name: Set up Maven cache
        uses: actions/cache@v5
        with:
          path: "~/.m2/repository"
          key: maven-testing-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}

      - name: Set up JDK ${{ vars.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ vars.JAVA_VERSION }}
          distribution: ${{ vars.JAVA_DISTRIBUTION }}

      - name: Cache SonarQube packages
        uses: actions/cache@v5
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar

      - name: Create report directories
        run: |
          mkdir -p frontend/coverage

      - name: Download frontend reports
        uses: actions/download-artifact@v5
        with:
          name: frontend-test-reports
          path: frontend/

      - name: Download backend reports
        uses: actions/download-artifact@v5
        with:
          name: backend-test-reports
          path: .

      - name: Debug
        run: tree

      - name: Debug 2
        run: pwd

      - name: Build and analyze
        run: |
          mvn package org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
          -DskipTests \
          -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
          -Dsonar.host.url=${{ vars.SONAR_HOST_URL }} \
          -Dsonar.javascript.lcov.reportPaths=$GITHUB_WORKSPACE/frontend/coverage/lcov.info \
          -Dsonar.coverage.jacoco.xmlReportPaths=$GITHUB_WORKSPACE/site/jacoco-merged-test-coverage-report/jacoco.xml

      - name: SonarQube Quality Gate check
        id: sonarqube-quality-gate-check
        uses: SonarSource/sonarqube-quality-gate-action@v1.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
