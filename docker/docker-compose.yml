---
include:
  - path: docker-compose.e2e.yml
    profiles:
      - e2e
  - path: docker-compose.prod.yml
    profiles:
      - prod

services:
  pcts-db:
    container_name: pcts-db
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pwd
      POSTGRES_DB: pcts
    ports:
      - "5432:5432"

  pcts-wiremock:
    container_name: pcts-wiremock
    image: wiremock/wiremock:latest
    ports:
      - "8443:8080"
    volumes:
      - ./wiremock:/home/wiremock

  pcts-backend:
    container_name: pcts-backend
    ports:
      - "8080:8080"
    environment:
      PCTS_SPRING_DATASOURCE_URL: pcts-db
    depends_on:
      - pcts-db
      - pcts-wiremock

  pcts-frontend:
    container_name: pcts-frontend
    ports:
      - "4200:4200"
    depends_on:
      - pcts-backend
