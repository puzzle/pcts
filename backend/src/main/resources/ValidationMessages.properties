# IMPORTANT: This file needs to be at src/main/resources/ValidationMessages.properties and named this way for spring to pick it up!!
key.class.field=key={key}, class={class}, field={field}
key.class.field.is=key={key}, class={class}, field={field}, is={is}
key.class.field.is.min.max=key={key}, class={class}, field={field}, is={is}, min={min}, max={max}

attribute.not.null={key.class.field}
attribute.not.negative={key.class.field}
attribute.not.blank={key.class.field}
attribute.size.between={key.class.field.is.min.max}
attribute.min.value={key.class.field.is}
attribute.max.value={key.class.field.is}
attribute.date.past={key.class.field.is}
validation.basicString.default=value must not be null or blank and must contain between 2 and 250 characters.
