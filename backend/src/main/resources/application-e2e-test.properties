spring.application.name=PCTS

# Database
spring.datasource.url=jdbc:postgresql://${PCTS_SPRING_DATASOURCE_URL:localhost}:5432/pcts
spring.datasource.username=user
spring.datasource.password=pwd
spring.datasource.driver-class-name=org.postgresql.Driver

#Flyway
spring.flyway.locations=classpath:db/migration,classpath:db/e2e-data-migration
spring.flyway.schemas=public

# Swagger UI
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# PTime Sync
app.member-sync.url=http://dummy-url.test
app.member-sync.enabled=true
app.member-sync.cron=0 0 3 * * ?
app.member-sync.username=
app.member-sync.password=

# Authentication & JWT
pcts.security.authentication.display-name-claim=name
pcts.security.authorization.admin-authorities=org_hr,org_gl
pcts.security.authorization.authorities-spel-expression=[pitc][roles]

# Keycloak config exposed to frontend
pcts.frontend.keycloak.url=http://localhost:8544
pcts.frontend.keycloak.realm=pitc
pcts.frontend.keycloak.client-id=pcts-dev