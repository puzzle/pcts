spring.application.name=PCTS

spring.datasource.url=jdbc:postgresql://${PCTS_SPRING_DATASOURCE_URL:localhost}:5432/pcts
spring.datasource.username=user
spring.datasource.password=pwd
spring.datasource.driver-class-name=org.postgresql.Driver

#Flyway
spring.flyway.locations=classpath:db/migration,classpath:db/e2e-data-migration
spring.flyway.schemas=public

springdoc.api-docs.enabled=true

app.member-sync.url=http://dummy-url.test
app.member-sync.enabled=true
app.member-sync.cron=0 0 3 * * ?
app.member-sync.username=
app.member-sync.password=