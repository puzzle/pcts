spring.flyway.locations=classpath:db/migration,classpath:db/test-data-migration

# PTime Sync
app.link-check.cron=0 0 3 * * ?
app.link-check.max-retries=3

app.member-sync.url=http://dummy-url.test
app.member-sync.enabled=true
app.member-sync.cron=0 0 3 * * ?
app.member-sync.username=
app.member-sync.password=

# OAuth
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8544/realms/pitc
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8544/realms/pitc/protocol/openid-connect/certs

# Authentication & JWT
pcts.authentication.username-claim=name
pcts.authentication.authorities-path=[pitc][roles]
pcts.authentication.admin-authorities=org_hr,org_gl